apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-platform
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/baljitsingh-alt/task-platform-infra
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: task-platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true